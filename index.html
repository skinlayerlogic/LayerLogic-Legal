<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LayerLogic — Legal</title>
  <style>
    :root {
      --text: #1a1a2e;
      --muted: #555;
      --accent: #6c63ff;
      --bg: #fafafa;
      --card: #ffffff;
      --border: #e8e8e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .links a {
      display: block;
      padding: 0.85rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 0.95rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .links a:hover {
      border-color: var(--accent);
      background: #f4f3ff;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LayerLogic</h1>
    <p>Legal Documents</p>
    <div class="links">
      <a href="layerlogic-privacy-policy.html">Privacy Policy</a>
      <a href="layerlogic-terms-of-service.html">Terms of Service</a>
    </div>
    <div class="footer">&copy; 2026 LayerLogic</div>
  </div>
</body>
</html>
